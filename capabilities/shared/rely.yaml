naftiko: "1.0.0-alpha1"

info:
  label: Rely.io Public API
  description: >-
    Rely.io Internal Developer Portal API providing full CRUD access to
    software catalog blueprints, entities, engineering scorecards, self-service
    actions, automations, and user management.
  tags:
    - Rely.io
    - Internal Developer Portal
    - Platform Engineering
    - Software Catalog
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      RELY_API_KEY: RELY_API_KEY

capability:
  consumes:
    - type: http
      namespace: rely
      baseUri: https://api.rely.io
      description: Rely.io Public REST API
      authentication:
        type: bearer
        token: "{{RELY_API_KEY}}"
      resources:
        - name: blueprints
          path: /api/v1/blueprints
          description: Software catalog blueprint schemas
          operations:
            - name: list-blueprints
              method: GET
              description: List all blueprint schemas in the organization
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-blueprint
              method: POST
              description: Create a new blueprint schema
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  id: "{{tools.id}}"
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  properties: "{{tools.properties}}"
                  relations: "{{tools.relations}}"
            - name: get-blueprint
              method: GET
              description: Get a specific blueprint by ID
              inputParameters:
                - name: blueprintId
                  in: path
                  type: string
                  required: true
                  description: Blueprint identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-blueprint
              method: PUT
              description: Update an existing blueprint schema
              inputParameters:
                - name: blueprintId
                  in: path
                  type: string
                  required: true
                  description: Blueprint identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
            - name: delete-blueprint
              method: DELETE
              description: Delete a blueprint schema
              inputParameters:
                - name: blueprintId
                  in: path
                  type: string
                  required: true
                  description: Blueprint identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: entities
          path: /api/v1/blueprints/{blueprintId}/entities
          description: Software catalog entity instances
          operations:
            - name: list-entities
              method: GET
              description: List all entities of a specific blueprint type
              inputParameters:
                - name: blueprintId
                  in: path
                  type: string
                  required: true
                  description: Blueprint identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-entity
              method: POST
              description: Create a new catalog entity
              inputParameters:
                - name: blueprintId
                  in: path
                  type: string
                  required: true
                  description: Blueprint identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  id: "{{tools.id}}"
                  name: "{{tools.name}}"
                  properties: "{{tools.properties}}"
            - name: get-entity
              method: GET
              description: Get a specific catalog entity
              inputParameters:
                - name: blueprintId
                  in: path
                  type: string
                  required: true
                  description: Blueprint identifier
                - name: entityId
                  in: path
                  type: string
                  required: true
                  description: Entity identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-entity
              method: PUT
              description: Update a catalog entity
              inputParameters:
                - name: blueprintId
                  in: path
                  type: string
                  required: true
                  description: Blueprint identifier
                - name: entityId
                  in: path
                  type: string
                  required: true
                  description: Entity identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  properties: "{{tools.properties}}"
            - name: delete-entity
              method: DELETE
              description: Delete a catalog entity
              inputParameters:
                - name: blueprintId
                  in: path
                  type: string
                  required: true
                  description: Blueprint identifier
                - name: entityId
                  in: path
                  type: string
                  required: true
                  description: Entity identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: scorecards
          path: /api/v1/scorecards
          description: Engineering scorecards
          operations:
            - name: list-scorecards
              method: GET
              description: List all engineering scorecards
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-scorecard
              method: POST
              description: Create a new engineering scorecard
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  blueprintId: "{{tools.blueprintId}}"
                  rules: "{{tools.rules}}"
            - name: get-scorecard
              method: GET
              description: Get a specific scorecard
              inputParameters:
                - name: scorecardId
                  in: path
                  type: string
                  required: true
                  description: Scorecard identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: actions
          path: /api/v1/actions
          description: Self-service developer actions
          operations:
            - name: list-actions
              method: GET
              description: List all self-service actions
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-action
              method: POST
              description: Create a new self-service action
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  blueprintId: "{{tools.blueprintId}}"
                  trigger: "{{tools.trigger}}"
                  invocationMethod: "{{tools.invocationMethod}}"
            - name: get-action
              method: GET
              description: Get a specific self-service action
              inputParameters:
                - name: actionId
                  in: path
                  type: string
                  required: true
                  description: Action identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: automations
          path: /api/v1/automations
          description: Catalog automation rules
          operations:
            - name: list-automations
              method: GET
              description: List all automation rules
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-automation
              method: POST
              description: Create a new automation rule
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  trigger: "{{tools.trigger}}"
                  action: "{{tools.action}}"

  exposes:
    - type: rest
      port: 8100
      namespace: rely-api
      resources:
        - path: /v1/blueprints
          name: blueprints
          description: Blueprint schemas
          operations:
            - method: GET
              name: list-blueprints
              description: List all blueprints
              call: "rely.list-blueprints"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-blueprint
              description: Create a blueprint
              call: "rely.create-blueprint"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/blueprints/{blueprintId}/entities
          name: entities
          description: Catalog entities
          operations:
            - method: GET
              name: list-entities
              description: List entities of a blueprint type
              call: "rely.list-entities"
              with:
                blueprintId: "rest.blueprintId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/scorecards
          name: scorecards
          description: Engineering scorecards
          operations:
            - method: GET
              name: list-scorecards
              description: List all scorecards
              call: "rely.list-scorecards"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/actions
          name: actions
          description: Self-service actions
          operations:
            - method: GET
              name: list-actions
              description: List all self-service actions
              call: "rely.list-actions"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: rely-mcp
      transport: http
      tools:
        - name: list-blueprints
          description: List all blueprint schemas in the developer portal
          hints:
            readOnly: true
            openWorld: true
          call: "rely.list-blueprints"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-blueprint
          description: Create a new blueprint schema for a catalog entity type
          hints:
            readOnly: false
            destructive: false
          call: "rely.create-blueprint"
          with:
            id: "tools.id"
            name: "tools.name"
            description: "tools.description"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-blueprint
          description: Get a specific blueprint schema by ID
          hints:
            readOnly: true
            openWorld: false
          call: "rely.get-blueprint"
          with:
            blueprintId: "tools.blueprintId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-entities
          description: List catalog entities of a specific blueprint type
          hints:
            readOnly: true
            openWorld: true
          call: "rely.list-entities"
          with:
            blueprintId: "tools.blueprintId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-entity
          description: Create a new catalog entity
          hints:
            readOnly: false
            destructive: false
          call: "rely.create-entity"
          with:
            blueprintId: "tools.blueprintId"
            id: "tools.id"
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-entity
          description: Get a specific catalog entity by ID
          hints:
            readOnly: true
            openWorld: false
          call: "rely.get-entity"
          with:
            blueprintId: "tools.blueprintId"
            entityId: "tools.entityId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-scorecards
          description: List all engineering scorecards
          hints:
            readOnly: true
            openWorld: true
          call: "rely.list-scorecards"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-scorecard
          description: Get a specific engineering scorecard with its rules
          hints:
            readOnly: true
            openWorld: false
          call: "rely.get-scorecard"
          with:
            scorecardId: "tools.scorecardId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-actions
          description: List all self-service developer actions
          hints:
            readOnly: true
            openWorld: true
          call: "rely.list-actions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-automations
          description: List all catalog automation rules
          hints:
            readOnly: true
            openWorld: true
          call: "rely.list-automations"
          outputParameters:
            - type: object
              mapping: "$."
