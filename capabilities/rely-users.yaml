naftiko: 1.0.0-alpha2
info:
  label: Rely.io Public API — Users
  description: 'Rely.io Public API — Users. 1 operations. Lead operation: Invite User. Self-contained Naftiko capability covering
    one Rely business surface.'
  tags:
  - Rely
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RELY_API_KEY: RELY_API_KEY
capability:
  consumes:
  - type: http
    namespace: rely-users
    baseUri: https://api.rely.io
    description: Rely.io Public API — Users business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-legacy-users-invite
      path: /api/v1/legacy/users/invite
      operations:
      - name: inviteuser
        method: POST
        description: Invite User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.RELY_API_KEY}}'
  exposes:
  - type: rest
    namespace: rely-users-rest
    port: 8080
    description: REST adapter for Rely.io Public API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v1/legacy/users/invite
      name: api-v1-legacy-users-invite
      description: REST surface for api-v1-legacy-users-invite.
      operations:
      - method: POST
        name: inviteuser
        description: Invite User
        call: rely-users.inviteuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rely-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Rely.io Public API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: invite-user
      description: Invite User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rely-users.inviteuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
