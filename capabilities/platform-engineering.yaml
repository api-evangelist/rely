naftiko: 1.0.0-alpha2
info:
  label: Rely.io Platform Engineering
  description: Unified workflow capability for platform engineering teams using Rely.io. Combines catalog management, scorecard
    evaluation, self-service action configuration, and automation management into a single integration for building and operating
    internal developer portals. Used by platform engineers to programmatically manage the service catalog, enforce engineering
    standards, and automate developer workflows.
  tags:
  - Rely.io
  - Platform Engineering
  - Internal Developer Portal
  - Software Catalog
  - Engineering Scorecards
  - Self-Service Actions
  created: '2026-05-02'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    RELY_API_KEY: RELY_API_KEY
capability:
  consumes:
  - type: http
    namespace: rely
    baseUri: https://api.rely.io
    description: Rely.io Public REST API
    authentication:
      type: bearer
      token: '{{RELY_API_KEY}}'
    resources:
    - name: blueprints
      path: /api/v1/blueprints
      description: Software catalog blueprint schemas
      operations:
      - name: list-blueprints
        method: GET
        description: List all blueprint schemas in the organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-blueprint
        method: POST
        description: Create a new blueprint schema
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            id: '{{tools.id}}'
            name: '{{tools.name}}'
            description: '{{tools.description}}'
            properties: '{{tools.properties}}'
            relations: '{{tools.relations}}'
      - name: get-blueprint
        method: GET
        description: Get a specific blueprint by ID
        inputParameters:
        - name: blueprintId
          in: path
          type: string
          required: true
          description: Blueprint identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-blueprint
        method: PUT
        description: Update an existing blueprint schema
        inputParameters:
        - name: blueprintId
          in: path
          type: string
          required: true
          description: Blueprint identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            description: '{{tools.description}}'
      - name: delete-blueprint
        method: DELETE
        description: Delete a blueprint schema
        inputParameters:
        - name: blueprintId
          in: path
          type: string
          required: true
          description: Blueprint identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: entities
      path: /api/v1/blueprints/{blueprintId}/entities
      description: Software catalog entity instances
      operations:
      - name: list-entities
        method: GET
        description: List all entities of a specific blueprint type
        inputParameters:
        - name: blueprintId
          in: path
          type: string
          required: true
          description: Blueprint identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-entity
        method: POST
        description: Create a new catalog entity
        inputParameters:
        - name: blueprintId
          in: path
          type: string
          required: true
          description: Blueprint identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            id: '{{tools.id}}'
            name: '{{tools.name}}'
            properties: '{{tools.properties}}'
      - name: get-entity
        method: GET
        description: Get a specific catalog entity
        inputParameters:
        - name: blueprintId
          in: path
          type: string
          required: true
          description: Blueprint identifier
        - name: entityId
          in: path
          type: string
          required: true
          description: Entity identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-entity
        method: PUT
        description: Update a catalog entity
        inputParameters:
        - name: blueprintId
          in: path
          type: string
          required: true
          description: Blueprint identifier
        - name: entityId
          in: path
          type: string
          required: true
          description: Entity identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            properties: '{{tools.properties}}'
      - name: delete-entity
        method: DELETE
        description: Delete a catalog entity
        inputParameters:
        - name: blueprintId
          in: path
          type: string
          required: true
          description: Blueprint identifier
        - name: entityId
          in: path
          type: string
          required: true
          description: Entity identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: scorecards
      path: /api/v1/scorecards
      description: Engineering scorecards
      operations:
      - name: list-scorecards
        method: GET
        description: List all engineering scorecards
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-scorecard
        method: POST
        description: Create a new engineering scorecard
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            blueprintId: '{{tools.blueprintId}}'
            rules: '{{tools.rules}}'
      - name: get-scorecard
        method: GET
        description: Get a specific scorecard
        inputParameters:
        - name: scorecardId
          in: path
          type: string
          required: true
          description: Scorecard identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: actions
      path: /api/v1/actions
      description: Self-service developer actions
      operations:
      - name: list-actions
        method: GET
        description: List all self-service actions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-action
        method: POST
        description: Create a new self-service action
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            blueprintId: '{{tools.blueprintId}}'
            trigger: '{{tools.trigger}}'
            invocationMethod: '{{tools.invocationMethod}}'
      - name: get-action
        method: GET
        description: Get a specific self-service action
        inputParameters:
        - name: actionId
          in: path
          type: string
          required: true
          description: Action identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: automations
      path: /api/v1/automations
      description: Catalog automation rules
      operations:
      - name: list-automations
        method: GET
        description: List all automation rules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-automation
        method: POST
        description: Create a new automation rule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            trigger: '{{tools.trigger}}'
            action: '{{tools.action}}'
  exposes:
  - type: rest
    port: 8080
    namespace: rely-platform-api
    description: Unified REST API for Rely.io platform engineering operations.
    resources:
    - path: /v1/blueprints
      name: blueprints
      description: Software catalog blueprint schemas
      operations:
      - method: GET
        name: list-blueprints
        description: List all blueprint schemas
        call: rely.list-blueprints
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-blueprint
        description: Create a new blueprint schema
        call: rely.create-blueprint
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/blueprints/{blueprintId}
      name: blueprint
      description: Individual blueprint schema
      operations:
      - method: GET
        name: get-blueprint
        description: Get blueprint details
        call: rely.get-blueprint
        with:
          blueprintId: rest.blueprintId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/blueprints/{blueprintId}/entities
      name: entities
      description: Catalog entities of a blueprint type
      operations:
      - method: GET
        name: list-entities
        description: List entities
        call: rely.list-entities
        with:
          blueprintId: rest.blueprintId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-entity
        description: Create a catalog entity
        call: rely.create-entity
        with:
          blueprintId: rest.blueprintId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/blueprints/{blueprintId}/entities/{entityId}
      name: entity
      description: Individual catalog entity
      operations:
      - method: GET
        name: get-entity
        description: Get entity details
        call: rely.get-entity
        with:
          blueprintId: rest.blueprintId
          entityId: rest.entityId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/scorecards
      name: scorecards
      description: Engineering scorecards
      operations:
      - method: GET
        name: list-scorecards
        description: List all scorecards
        call: rely.list-scorecards
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-scorecard
        description: Create a scorecard
        call: rely.create-scorecard
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/scorecards/{scorecardId}
      name: scorecard
      description: Individual scorecard
      operations:
      - method: GET
        name: get-scorecard
        description: Get scorecard details
        call: rely.get-scorecard
        with:
          scorecardId: rest.scorecardId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/actions
      name: actions
      description: Self-service developer actions
      operations:
      - method: GET
        name: list-actions
        description: List all self-service actions
        call: rely.list-actions
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-action
        description: Create a self-service action
        call: rely.create-action
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/automations
      name: automations
      description: Catalog automation rules
      operations:
      - method: GET
        name: list-automations
        description: List all automations
        call: rely.list-automations
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-automation
        description: Create an automation rule
        call: rely.create-automation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: rely-platform-mcp
    transport: http
    description: MCP server for AI-assisted internal developer portal management.
    tools:
    - name: list-blueprints
      description: List all blueprint schemas defining catalog entity types
      hints:
        readOnly: true
        openWorld: true
      call: rely.list-blueprints
      outputParameters:
      - type: object
        mapping: $.
    - name: create-blueprint
      description: Create a new blueprint schema for a catalog entity type
      hints:
        readOnly: false
        destructive: false
      call: rely.create-blueprint
      with:
        id: tools.id
        name: tools.name
        description: tools.description
        properties: tools.properties
        relations: tools.relations
      outputParameters:
      - type: object
        mapping: $.
    - name: get-blueprint
      description: Get a specific blueprint schema and its property definitions
      hints:
        readOnly: true
        openWorld: false
      call: rely.get-blueprint
      with:
        blueprintId: tools.blueprintId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-entities
      description: List all catalog entities of a specific blueprint type (services, teams, deployments)
      hints:
        readOnly: true
        openWorld: true
      call: rely.list-entities
      with:
        blueprintId: tools.blueprintId
      outputParameters:
      - type: object
        mapping: $.
    - name: create-entity
      description: Create a new catalog entity such as a service or team
      hints:
        readOnly: false
        destructive: false
      call: rely.create-entity
      with:
        blueprintId: tools.blueprintId
        id: tools.id
        name: tools.name
        properties: tools.properties
      outputParameters:
      - type: object
        mapping: $.
    - name: get-entity
      description: Get details for a specific catalog entity
      hints:
        readOnly: true
        openWorld: false
      call: rely.get-entity
      with:
        blueprintId: tools.blueprintId
        entityId: tools.entityId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-entity
      description: Update a catalog entity's properties and relations
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rely.update-entity
      with:
        blueprintId: tools.blueprintId
        entityId: tools.entityId
        name: tools.name
        properties: tools.properties
      outputParameters:
      - type: object
        mapping: $.
    - name: list-scorecards
      description: List all engineering scorecards tracking service standards
      hints:
        readOnly: true
        openWorld: true
      call: rely.list-scorecards
      outputParameters:
      - type: object
        mapping: $.
    - name: create-scorecard
      description: Create a new engineering scorecard with rules and thresholds
      hints:
        readOnly: false
        destructive: false
      call: rely.create-scorecard
      with:
        name: tools.name
        blueprintId: tools.blueprintId
        rules: tools.rules
      outputParameters:
      - type: object
        mapping: $.
    - name: get-scorecard
      description: Get a specific scorecard with all its rules
      hints:
        readOnly: true
        openWorld: false
      call: rely.get-scorecard
      with:
        scorecardId: tools.scorecardId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-actions
      description: List all self-service developer actions available in the portal
      hints:
        readOnly: true
        openWorld: true
      call: rely.list-actions
      outputParameters:
      - type: object
        mapping: $.
    - name: create-action
      description: Create a new self-service action for developer workflows
      hints:
        readOnly: false
        destructive: false
      call: rely.create-action
      with:
        name: tools.name
        blueprintId: tools.blueprintId
        trigger: tools.trigger
        invocationMethod: tools.invocationMethod
      outputParameters:
      - type: object
        mapping: $.
    - name: list-automations
      description: List all automation rules configured in the portal
      hints:
        readOnly: true
        openWorld: true
      call: rely.list-automations
      outputParameters:
      - type: object
        mapping: $.
    - name: create-automation
      description: Create a new automation rule triggered by catalog changes
      hints:
        readOnly: false
        destructive: false
      call: rely.create-automation
      with:
        name: tools.name
        trigger: tools.trigger
        action: tools.action
      outputParameters:
      - type: object
        mapping: $.
